services:
  server:
    build: .
    volumes:
      - databases:/databases
      - documents:/documents
      - hf_cache:/app/.cache/huggingface
    ports:
      - 8000:8000
    environment:
      - HF_HOME=/app/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
      - OLLAMA_URL=host.docker.internal:11434
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src


volumes:
  databases:
  documents:
  hf_cache: